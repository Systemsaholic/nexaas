# Trigger.dev v4 self-hosted — Nexaas Orchestrator
# Mirrors Phoenix Voyages infrastructure/trigger-dev setup

services:
  trigger-webapp:
    image: ghcr.io/triggerdotdev/trigger.dev:v4-beta
    restart: unless-stopped
    ports:
      - "0.0.0.0:3040:3000"
    depends_on:
      trigger-postgres:
        condition: service_healthy
      trigger-redis:
        condition: service_healthy
      trigger-electric:
        condition: service_healthy
      trigger-clickhouse:
        condition: service_healthy
    volumes:
      - ./entrypoint.sh:/triggerdotdev/scripts/custom-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/triggerdotdev/scripts/custom-entrypoint.sh"]
    command: []
    environment:
      APP_ORIGIN: ${APP_ORIGIN}
      LOGIN_ORIGIN: ${LOGIN_ORIGIN}
      ELECTRIC_ORIGIN: http://trigger-electric:3000
      DATABASE_URL: ${TRIGGER_DATABASE_URL}
      DIRECT_URL: ${TRIGGER_DIRECT_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MANAGED_WORKER_SECRET: ${MANAGED_WORKER_SECRET}
      REDIS_HOST: trigger-redis
      REDIS_PORT: 6379
      REDIS_TLS_DISABLED: "true"
      CLICKHOUSE_URL: ${CLICKHOUSE_URL}
      RUN_REPLICATION_ENABLED: "1"
      RUN_REPLICATION_CLICKHOUSE_URL: ${RUN_REPLICATION_CLICKHOUSE_URL}
      OBJECT_STORE_BASE_URL: http://trigger-minio:9000
      OBJECT_STORE_ACCESS_KEY_ID: ${OBJECT_STORE_ACCESS_KEY_ID:-triggeradmin}
      OBJECT_STORE_SECRET_ACCESS_KEY: ${OBJECT_STORE_SECRET_ACCESS_KEY}
      DEPLOY_REGISTRY_HOST: localhost:5000
      DEPLOY_REGISTRY_NAMESPACE: trigger
      NODE_MAX_OLD_SPACE_SIZE: "${NODE_MAX_OLD_SPACE_SIZE:-800}"
      NODE_ENV: development
      TRIGGER_TELEMETRY_DISABLED: "1"
      WHITELISTED_EMAILS: ${WHITELISTED_EMAILS:-al@systemsaholic.com}
      TRIGGER_BOOTSTRAP_ENABLED: "0"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/healthcheck').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  trigger-postgres:
    image: postgres:14
    restart: unless-stopped
    volumes:
      - trigger-postgres-data:/var/lib/postgresql/data/
    command:
      - -c
      - wal_level=logical
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: trigger
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  trigger-redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - trigger-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  trigger-electric:
    image: electricsql/electric:1.2.4
    restart: unless-stopped
    depends_on:
      trigger-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${TRIGGER_DATABASE_URL}
      ELECTRIC_INSECURE: "true"
      ELECTRIC_USAGE_REPORTING: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  trigger-clickhouse:
    image: bitnamilegacy/clickhouse:latest
    restart: unless-stopped
    environment:
      CLICKHOUSE_ADMIN_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_ADMIN_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - trigger-clickhouse-data:/bitnami/clickhouse
      - ./clickhouse/override.xml:/bitnami/clickhouse/etc/config.d/override.xml:ro
    healthcheck:
      test:
        [
          "CMD", "clickhouse-client",
          "--host", "localhost", "--port", "9000",
          "--user", "${CLICKHOUSE_USER:-default}",
          "--password", "${CLICKHOUSE_PASSWORD}",
          "--query", "SELECT 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  trigger-minio:
    image: bitnamilegacy/minio:latest
    restart: unless-stopped
    volumes:
      - trigger-minio-data:/bitnami/minio/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKETS: packets
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  trigger-postgres-data:
  trigger-redis-data:
  trigger-clickhouse-data:
  trigger-minio-data:
