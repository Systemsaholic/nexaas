department: sales
schedules:
  - key: daily-standup
    cron: "0 8 * * 1-5"
    description: "Morning priorities, closing deals, calendar review"
    silence_if: never

  - key: weekly-pipeline
    cron: "30 7 * * 1"
    description: "Weekly pipeline review + stale deal nudges"
    silence_if: never

  - key: eod-check
    cron: "0 16 * * 1-5"
    description: "End-of-day check: deals closing in 48h"
    silence_if: "no urgent deals"

  - key: weekly-close
    cron: "0 16 * * 5"
    description: "Weekly close report: won/lost, revenue vs target"
    silence_if: never
