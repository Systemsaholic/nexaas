department: marketing
schedules:
  - key: content-calendar
    cron: "0 8 * * 1"
    description: "Content calendar review + SEO metrics"
    silence_if: never

  - key: social-queue
    cron: "0 9 * * 2,4"
    description: "Social queue check — draft posts if under 3 days queued"
    silence_if: "queue healthy"

  - key: monthly-report
    cron: "0 8 L * *"
    description: "Monthly marketing performance report"
    silence_if: never
