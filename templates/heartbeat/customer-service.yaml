department: customer-service
schedules:
  - key: queue-check
    cron: "0 8 * * 1-5"
    description: "Support queue: open tickets, SLA breaches, escalations"
    silence_if: "no SLA breaches"

  - key: weekly-csat
    cron: "0 9 * * 1"
    description: "Weekly CSAT: score, detractor themes, at-risk accounts"
    silence_if: "no responses"
