department: accounting
schedules:
  - key: daily-cashflow
    cron: "0 7 * * 1-5"
    description: "Cashflow check: overdue invoices, low cash alert, pending payments"
    silence_if: "all healthy"

  - key: month-end-close
    cron: "0 8 1 * *"
    description: "Month-end close checklist"
    silence_if: never

  - key: weekly-ar
    cron: "0 9 * * 1"
    description: "AR aging review: overdue invoices, collection follow-ups"
    silence_if: "no overdue invoices"
