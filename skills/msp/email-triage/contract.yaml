# Skill Contract — Email Triage
# Defines requirements, capabilities, and constraints for this skill

skill: email-triage
version: "1.0.0"
category: msp
type: simple  # simple | agentic

description: >
  Classifies incoming emails, determines disposition (reply, escalate, file, flag),
  drafts responses when appropriate, and routes through TAG for action.

# Execution model
execution:
  type: simple           # Single Claude API call, structured JSON response
  model: claude-sonnet-4-20250514
  max_tokens: 1000
  timeout_seconds: 30

# Email adapter — skill works with any of these
adapters:
  - gmail
  - imap
  - microsoft_365

# Required integrations on the instance
requires:
  email_adapter:
    scopes: [read, label, move, mark_read]
  notification:
    any_of: [sms, email, slack, telegram]  # at least one

# Fields the client MUST configure during onboarding (skill inactive until all present)
client_must_configure:
  required:
    - mark_read_preference
    - notify_mode
    - approval_gates
    - hard_limits
    - escalation_rules.financial
  optional:
    - folder_sort
    - auto_draft

# Platform-locked fields — client cannot override these
platform_locked:
  always_classify: true
  always_audit_log: true
  always_produce_reasoning: true
  max_auto_reply_length: 300
  min_approval_gate: notify_after   # client can tighten, never loosen

# What the skill reads from context (CAG)
reads_from_context:
  - client_profile: [tone, domain, known_contacts]
  - approval_gates: [reply_external, reply_known]
  - hard_limits
  - escalation_rules
  - workflow_state: [open_threads, prior_actions]

# RAG retrieval strategy
rag:
  primary: "[tenant]_knowledge"
  skill_docs: "skill/email-triage-docs"
  fallback: "global/email_policies"
  limit: 3

# What the skill writes back (workflow state)
produces:
  - classification
  - disposition
  - draft_reply
  - approval_pending
  - action_taken
  - reasoning
  - mark_read_applied
  - folder_applied

# TAG route defaults for this skill
tag_defaults:
  auto_execute: [spam, internal, archive, file]
  notify_after: [file_known, mark_read]
  approval_required: [reply_external]
  escalate: [financial_dispute, legal, complaint]
  flag: [hard_limit_triggered, uncertain, unknown_classification]

changelog:
  - version: "1.0.0"
    date: "2026-04-04"
    changes: "Initial skill package"
