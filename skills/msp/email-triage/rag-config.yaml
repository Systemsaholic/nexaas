# RAG Configuration — Email Triage
# Defines retrieval strategy for this skill

namespaces:
  primary: "[tenant]_knowledge"     # Client's own SOPs, policies, FAQs
  skill_docs: "skill/email-triage"  # Skill-specific reference (classification guides)
  fallback: "global/email_policies" # Platform-wide email handling defaults

retrieval:
  strategy: cascade                 # Search primary → skill_docs → fallback
  limit: 3                          # Max chunks per query
  min_relevance: 0.7                # Minimum similarity score
  include_metadata: true            # Return source doc title + page

# What to index in skill_docs namespace (maintained by ops)
skill_documents:
  - name: "Email Classification Guide"
    description: "How to classify different email types"
  - name: "Reply Templates"
    description: "Standard reply patterns per classification"
  - name: "Escalation Decision Tree"
    description: "When to escalate vs handle autonomously"
