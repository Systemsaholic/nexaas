# Skill Contract — Daily Bookkeeping
# Agentic skill: Claude uses tools to fetch, categorize, and record transactions

skill: daily-bookkeeping
version: "1.0.0"
category: finance
type: agentic  # simple | agentic

description: >
  Fetches daily bank transactions, auto-categorizes using rules,
  matches receipts, creates QuickBooks entries with attachments,
  and reconciles balances. Runs as a multi-step pipeline with
  Claude deciding which tools to call.

# Execution model
execution:
  type: agentic          # Multi-turn with tool use
  model: claude-sonnet-4-20250514
  max_tokens: 4000
  timeout_seconds: 600   # 10 minutes — pipeline can be long
  max_tool_calls: 50     # Safety limit on tool call loop
  concurrency_weight: 2  # Counts as 2 slots (memory-heavy)

# Required MCP servers
mcp_servers:
  - quickbooks           # QBO API (invoices, expenses, deposits)
  - email                # Receipt fetch from inboxes
  - filesystem           # Transaction YAML read/write
  - playwright           # Bank portal login for CSV fetch

# Required integrations on the instance
requires:
  quickbooks:
    scopes: [read_transactions, create_purchase, create_deposit, upload_attachment]
  email_adapter:
    scopes: [read, search]
  bank_csv:
    type: custom         # Instance must configure CSV fetch method
  document_store:
    any_of: [paperless, nextcloud]  # Receipt storage

# Fields the client MUST configure
client_must_configure:
  required:
    - bank_accounts           # List of accounts to process
    - categorization_rules    # Payee → category mapping
    - tax_codes               # Vendor tax overrides
    - chart_of_accounts       # QBO account mapping
    - receipt_sources          # How to fetch receipts per vendor
  optional:
    - commission_suppliers    # If travel agency — supplier remittance config
    - intercompany_config     # If inter-entity transactions
    - trust_accounts          # If regulated trust accounting

# Platform-locked fields
platform_locked:
  always_attach_documents: true    # Every QBO entry MUST have a doc
  always_audit_log: true
  never_create_cc_payments: true   # QBO auto-pairs these
  escalate_missing_docs: true      # Never skip, always escalate
  balance_check_required: true     # Must verify ending balance

# CAG context layers
reads_from_context:
  - client_profile: [business_entity, fiscal_year, currency]
  - bank_accounts: [account_ids, csv_formats, qbo_mapping]
  - categorization_rules: [patterns, tax_overrides]
  - workflow_state: [last_import_date, pending_transactions, unmatched_items]

# RAG
rag:
  primary: "[tenant]_knowledge"
  skill_docs: "skill/bookkeeping-docs"
  fallback: "global/accounting_policies"
  limit: 5

# What the skill produces
produces:
  - transactions_imported
  - transactions_categorized
  - receipts_matched
  - qbo_entries_created
  - balance_verified
  - unmatched_items
  - missing_receipts_escalated

# TAG routes
tag_defaults:
  auto_execute: [categorize, import, match_receipt, create_expense_under_500]
  approval_required: [create_expense_over_500, create_deposit, journal_entry]
  escalate: [missing_document, balance_mismatch, unidentified_transaction]
  flag: [duplicate_detected, tax_code_uncertain, regulatory_item]

changelog:
  - version: "1.0.0"
    date: "2026-04-04"
    changes: "Initial agentic skill package"
