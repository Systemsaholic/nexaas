skill: weather-forecast
version: "1.0.0"
category: operations
type: simple

description: >
  Retrieves current weather conditions and forecast for configured locations.
  Uses the Open-Meteo MCP server for weather data (free, no API key required).

execution:
  type: simple
  model: claude-sonnet-4-20250514
  max_tokens: 1000
  timeout_seconds: 30

mcp_servers:
  - open-meteo

requires: {}

client_must_configure:
  required: []
  optional:
    - location

platform_locked:
  always_audit_log: true
  always_produce_reasoning: true

reads_from_context:
  - client_profile

rag:
  primary: "[tenant]_knowledge"
  skill_docs: "skill/weather-forecast-docs"
  fallback: "global/operations_policies"
  limit: 3

produces:
  - temperature
  - condition
  - forecast_summary

tag_defaults:
  auto_execute: [weather_check]
  flag: [hard_limit_triggered]

changelog:
  - version: "1.0.0"
    date: "2026-04-05"
    changes: "Initial skill package — Open-Meteo API, no key required"
