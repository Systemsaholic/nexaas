routes:
  auto_execute:
    conditions: []
    actions:
      - execute
      - audit_log
  approval_required:
    conditions: []
    actions:
      - send_approval_request
      - audit_log
  escalate:
    conditions: []
    actions:
      - forward_to_escalation_target
      - audit_log
  flag:
    conditions:
      - hard_limit_triggered: true
      - requires_human_review: true
    actions:
      - create_review_task
      - audit_log
