# mcp/_registry.yaml
# All MCP servers available in the Nexaas network
# Each workspace manifest references servers from this registry by name

version: "2.0"

servers:
  - id: filesystem
    name: "Filesystem"
    description: "Read, write, edit files in the workspace"
    defaultPort: 3100
    capabilities: [read, write, edit, glob, search]
    requiredEnv: []
    config: configs/filesystem.yaml

  - id: email
    name: "Email"
    description: "Send and receive email, manage threads"
    defaultPort: 3101
    capabilities: [send, read, search, draft]
    requiredEnv: [EMAIL_HOST, EMAIL_USER, EMAIL_PASS]
    config: configs/email.yaml

  - id: m365
    name: "Microsoft 365"
    description: "Exchange, Teams, SharePoint, Azure AD administration"
    defaultPort: 3102
    capabilities: [exchange, teams, sharepoint, azure-ad, intune]
    requiredEnv: [M365_TENANT_ID, M365_CLIENT_ID, M365_CLIENT_SECRET]
    config: configs/m365.yaml

  - id: github
    name: "GitHub"
    description: "Repository management, issues, PRs"
    defaultPort: 3103
    capabilities: [repos, issues, prs, commits, branches]
    requiredEnv: [GITHUB_TOKEN]
    config: configs/github.yaml

  - id: postgres
    name: "PostgreSQL"
    description: "Database queries and administration"
    defaultPort: 3104
    capabilities: [query, schema, migrations]
    requiredEnv: [POSTGRES_CONNECTION_STRING]
    config: configs/postgres.yaml

  - id: playwright
    name: "Playwright"
    description: "Browser automation, screenshots, visual verification"
    defaultPort: 3105
    capabilities: [screenshot, navigate, interact, extract]
    requiredEnv: []
    config: configs/playwright.yaml
    systemRequires: playwright

  - id: brave-search
    name: "Brave Search"
    description: "Web search"
    defaultPort: 3106
    capabilities: [search, news]
    requiredEnv: [BRAVE_API_KEY]
    config: configs/brave-search.yaml

  - id: slack
    name: "Slack"
    description: "Send messages, read channels, manage notifications"
    defaultPort: 3107
    capabilities: [send, read, channels, users]
    requiredEnv: [SLACK_BOT_TOKEN]
    config: configs/slack.yaml

  - id: sequential-thinking
    name: "Sequential Thinking"
    description: "Structured multi-step reasoning"
    defaultPort: 3108
    capabilities: [reasoning, planning]
    requiredEnv: []
    config: configs/sequential-thinking.yaml

  - id: memory
    name: "Memory"
    description: "Persistent agent memory across sessions"
    defaultPort: 3109
    capabilities: [store, retrieve, search]
    requiredEnv: []
    config: configs/memory.yaml

  - id: fetch
    name: "Fetch"
    description: "HTTP requests, web content retrieval"
    defaultPort: 3110
    capabilities: [get, post, parse-html]
    requiredEnv: []
    config: configs/fetch.yaml

  - id: nextcloud
    name: "Nextcloud"
    description: "File storage and sharing"
    defaultPort: 3111
    capabilities: [files, share, calendar, contacts]
    requiredEnv: [NEXTCLOUD_URL, NEXTCLOUD_USER, NEXTCLOUD_PASS]
    config: configs/nextcloud.yaml

  - id: telegram
    name: "Telegram"
    description: "Send and receive Telegram messages"
    defaultPort: 3112
    capabilities: [send, receive, bots]
    requiredEnv: [TELEGRAM_BOT_TOKEN]
    config: configs/telegram.yaml

  - id: vaultwarden
    name: "Vaultwarden"
    description: "Password vault access"
    defaultPort: 3113
    capabilities: [retrieve, store]
    requiredEnv: [VAULTWARDEN_URL, VAULTWARDEN_TOKEN]
    config: configs/vaultwarden.yaml

  - id: docuseal
    name: "DocuSeal"
    description: "Document signing and management"
    defaultPort: 3114
    capabilities: [sign, create, track]
    requiredEnv: [DOCUSEAL_API_KEY]
    config: configs/docuseal.yaml

  - id: groundhogg
    name: "Groundhogg CRM"
    description: "CRM contacts, campaigns, automations"
    defaultPort: 3115
    capabilities: [contacts, campaigns, tags, emails]
    requiredEnv: [GROUNDHOGG_URL, GROUNDHOGG_API_KEY]
    config: configs/groundhogg.yaml
