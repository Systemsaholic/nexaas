name: nexaas-memory
description: "Nexaas Memory System — event log, knowledge graph, semantic search, agent journal"
category: infrastructure
requires_env: [DATABASE_URL]

# Custom MCP server built for Nexaas.
# Stores events, entities, relations, facts in nexaas_memory Postgres schema.
# Embeddings stored in local Qdrant collection.
#
# Enable in workspace contract.yaml:
#   mcp_servers:
#     - memory

config:
  command: node
  args:
    - "/opt/nexaas/mcp/servers/memory/dist/index.js"
  env:
    DATABASE_URL: "${DATABASE_URL}"
    QDRANT_URL: "${QDRANT_URL}"
