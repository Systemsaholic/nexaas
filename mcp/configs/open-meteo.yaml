name: open-meteo
description: Weather data via Open-Meteo API — forecast, historical, air quality, marine, geocoding.
category: data

requires_env: []

# Deployment
# Open-Meteo is a free, open-source weather API. No API key required
# for non-commercial use. For commercial use, see https://open-meteo.com/en/pricing
#
# 1. Install the MCP server:
#      cd /opt/nexaas/mcp/servers/open-meteo
#      npm install && npm run build
#
# 2. Enable in workspace manifest:
#      mcp_servers:
#        - open-meteo
#
# 3. No environment variables needed for free tier.
#    For commercial use with reserved API capacity, set:
#      OPEN_METEO_API_KEY=customer-xxxxxxxx
#    and prefix API URLs with: https://customer-{key}.open-meteo.com

config:
  command: node
  args:
    - "/opt/nexaas/mcp/servers/open-meteo/dist/index.js"
  env: {}
