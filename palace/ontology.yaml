# Nexaas Palace Ontology
# Registry of wings, halls, and room patterns.
#
# Status (#258): DESCRIPTIVE, not enforced — no runtime code reads this file.
# It documents the taxonomy so skill authors put state where others will look
# for it. One thing IS enforced: tests/contract-docs.test.ts fails CI when
# framework code writes a wing that isn't registered here, so the wing list
# below cannot silently drift from the code. Halls/rooms are free-form per
# workspace.
#
# Adding a new top-level wing still requires a PR against this file — the
# CI guard makes that mandatory rather than aspirational.

version: "1.1"

wings:
  inbox:
    purpose: Incoming messages and events awaiting processing
    halls:
      - email
      - messaging
      - webhook
      - file

  events:
    purpose: Domain events for triggering and audit
    halls:
      - bank
      - accounting
      - marketing
      - operations
      - onboarding
      - system
      - skill

  knowledge:
    purpose: Static or slow-changing reference material
    halls:
      - brand
      - compliance
      - accounting
      - marketing
      - suppliers
      - customers
      - policies
      - landing-pages

  accounting:
    purpose: Accounting agent business data
    halls:
      - transactions
      - reconciliation
      - invoices
      - work-orders
      - receipts
      - reports

  marketing:
    purpose: Marketing agent business data
    halls:
      - campaigns
      - creative
      - social
      - analytics
      - email-broadcasts

  operations:
    purpose: Operations agent business data
    halls:
      - tasks
      - incidents
      - maintenance
      - fleet

  onboarding:
    purpose: Client/employee onboarding workflows
    halls:
      - intake
      - documents
      - provisioning
      - verification

  notifications:
    purpose: Pending outbound notifications
    halls:
      - pending
      - delivered
      - failed

  ops:
    purpose: Ops-visible state (framework-level observability)
    halls:
      - escalations
      - errors
      - audits
      - health
      - telemetry
      - integrations
      - domains
      - backups
      - models
      - operators
      - acknowledgments
      - incidents
      - contract_edits
      - activity

  personas:
    purpose: Persistent persona memory (PA service — thread state, preferences)
    halls:
      - threads
      - preferences

  waitpoints:
    purpose: Dormant approval/inbound-match signals awaiting resolution
    halls:
      - approvals
      - inbound-match

  library:
    purpose: Skill library — contributed skills, canonical versions, feedback
    halls:
      - skills
      - canonical
      - feedback

  batch:
    purpose: Batch buckets — drawers accumulating until a fire condition (#80)
    halls: []   # hall = bucket name, defined by producing skills
