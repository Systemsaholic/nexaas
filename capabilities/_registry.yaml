# Nexaas Capability Registry
# Every capability is an abstract interface for a class of integration.
# Skills declare capabilities they need; workspace manifests bind them to concrete MCPs.
#
# Stages:
#   experimental — first implementation, provisional interface, version 0.x
#   converging   — 2+ implementations, interface generalizing, version 1.0-beta
#   stable       — 3+ implementations, locked interface, conformance tests required
#
# ---
# Tool argument types — framework stance (#50)
# ---
# The framework does NOT coerce primitives when forwarding tool arguments
# to MCP servers. Arguments pass through JSON.parse / JSON.stringify
# untouched. Tool input shapes declared here are the MCP's contract.
#
# Manifest authors:
#   Quote values whose declared type is `string`, even if they look numeric.
#   A Telegram `chat_id: 1967590134` in `channel_bindings.<role>.config`
#   must be written `chat_id: "1967590134"` to match `to: string` on the
#   send tool. Unquoted will pass as a JSON integer and a well-behaved
#   MCP (e.g. Pydantic-backed FastMCP) will reject with `isError: true`.
#
# MCP authors:
#   Consider accepting `str | int` on fields that operators commonly
#   hand-type as numbers (chat IDs, phone numbers, account numbers).
#   Framework doesn't require it; it's ergonomic hygiene. Fields where
#   string IS the semantic type (names, URLs, content bodies) stay
#   string-only.
#
# Why not coerce framework-side: coercion would entangle the runtime
# with every MCP's schema semantics and lie to MCP authors who expect
# `to: str` to mean "I get a string." Keep MCPs as the source of truth
# for their input shapes; keep the framework tenant-agnostic.

version: "1.0"

capabilities:
  bank-source:
    stage: experimental
    interface_version: "0.1"
    description: List and fetch bank transactions, balances
    implementations: []
    tools:
      - name: list_transactions
        input: { account_id: string, from_date: string, to_date: string }
        output: { transactions: [{ id: string, date: string, amount: number, description: string, normalized_counterparty: string }] }
      - name: get_balance
        input: { account_id: string }
        output: { balance: number, currency: string, as_of: string }

  accounting-system:
    stage: experimental
    interface_version: "0.1"
    description: Read/write accounting entries, find matches, attach documents
    implementations: []
    tools:
      - name: find_matching_entry
        input: { amount: number, date: string, counterparty_hint: string? }
        output: { matches: [{ entry_id: string, confidence: number, account_path: string }] }
      - name: create_entry
        input: { date: string, amount: number, account_path: string, memo: string?, attachments: string[]? }
        output: { entry_id: string }
      - name: attach_document
        input: { entry_id: string, document_id: string }
        output: { success: boolean }

  document-store:
    stage: experimental
    interface_version: "0.1"
    description: Upload, retrieve, and search documents by metadata
    implementations: []
    tools:
      - name: upload
        input: { content_base64: string, filename: string, metadata: object? }
        output: { document_id: string }
      - name: search_documents
        input: { date_range: { from: string, to: string }?, amount_range: { min: number, max: number }?, text_query: string? }
        output: { documents: [{ id: string, filename: string, metadata: object }] }
      - name: get_content
        input: { document_id: string }
        output: { content_base64: string, filename: string, metadata: object }

  email-inbox:
    stage: experimental
    interface_version: "0.1"
    description: Poll an inbox, read threads, send replies, mark read
    implementations: []
    tools:
      - name: list_unread
        input: { folder: string?, limit: number? }
        output: { messages: [{ id: string, from: string, subject: string, date: string, snippet: string }] }
      - name: read_thread
        input: { thread_id: string }
        output: { messages: [{ id: string, from: string, to: string, subject: string, body: string, date: string, attachments: [{ filename: string, content_type: string }] }] }
      - name: reply_to
        input: { thread_id: string, body: string, html: boolean? }
        output: { message_id: string }
      - name: mark_read
        input: { message_ids: string[] }
        output: { success: boolean }

  email-outbound:
    stage: experimental
    interface_version: "0.1"
    description: Send transactional email
    implementations: []
    tools:
      - name: send
        input: { to: string, from: string, subject: string, html: string?, text: string?, attachments: [{ filename: string, content_base64: string }]? }
        output: { message_id: string, status: string }

  messaging-inbound:
    stage: experimental
    interface_version: "0.2"
    description: >
      Receive human messages from a channel (Telegram, WhatsApp, SMS, Slack, etc).
      Channel-agnostic by contract — framework primitives only; channel-native
      fields (Telegram's callback_query, Slack's action_id, WhatsApp's button_reply)
      are translated by adapters before the drawer is written.
    implementations: []
    # Canonical field shapes used across tools:
    #   attachment := { type: "image" | "document" | "audio" | "video" | "location",
    #                   url: string,
    #                   filename: string?,
    #                   mime_type: string?,
    #                   size_bytes: number? }
    #   action_button_click := { button_id: string, message_id: string }
    #     # fired when a user taps an inline button. `button_id` is the canonical
    #     # framework identifier (adapter maps Telegram callback_data, Slack
    #     # action_id, WhatsApp button_reply.id, etc. into this field).
    tools:
      - name: list_unread
        input: { channel_id: string?, limit: number? }
        output:
          messages:
            - id: string
              from: string
              content: string
              timestamp: string
              thread_id: string?
              reply_to: string?
              edited: boolean?             # true if this is an edit of a prior message
              attachments: attachment[]?
              action_button_click: action_button_click?
      - name: read_message
        input: { message_id: string }
        output:
          id: string
          from: string
          content: string
          timestamp: string
          thread_id: string?
          reply_to: string?
          edited: boolean?
          attachments: attachment[]?
          action_button_click: action_button_click?
      - name: mark_read
        input: { message_ids: string[] }
        output: { success: boolean }
      - name: intercept_code
        # Waitpoint primitive for OAuth / 2FA code delivery via the channel.
        # Registers a pattern; the next inbound message matching the pattern
        # resolves the waitpoint. Framework-owned (not channel-specific).
        input:
          pattern: string                   # regex
          from: string?                     # restrict to a sender id, optional
          expires_in_seconds: number?       # default 300
        output:
          waitpoint_id: string

  messaging-outbound:
    stage: experimental
    interface_version: "0.2"
    description: >
      Send messages to users on the same channel they came from. Channel-agnostic
      by contract — framework primitives only; channel adapters translate to
      channel-native API calls.
    implementations: []
    # Canonical vocabulary used across tools:
    #   parse_mode ∈ "markdown" | "html" | "plain"
    #     # framework-canonical formats; adapters map to channel-native dialects
    #     # (Telegram MarkdownV2, Slack mrkdwn, Discord md, etc.)
    #   inline_button := { text: string, button_id: string }
    #     # `button_id` surfaces back as action_button_click.button_id on the
    #     # inbound side — same identifier round-trips.
    #   typing_kind ∈ "composing" | "uploading-file" | "uploading-image"
    #                | "uploading-audio" | "uploading-video"
    tools:
      - name: send
        input:
          to: string
          content: string
          parse_mode: parse_mode?           # default "plain"
          inline_buttons: inline_button[]?
          reply_to: string?                 # message_id to reply to
        output:
          message_id: string                # framework-level id
          channel_native_id: string?        # adapter's native id for follow-ups
          status: string
      - name: edit
        # Edit a previously-sent message. Adapters that don't support edit
        # should return status: "unsupported" rather than throwing.
        input:
          message_id: string
          content: string
          inline_buttons: inline_button[]?
          parse_mode: parse_mode?
        output:
          status: string                    # "ok" | "unsupported" | "not_found"
      - name: typing_indicator
        # Transient signal — adapters fire and forget, no drawer written.
        # Channels that don't support a given kind ignore silently.
        input:
          to: string
          kind: typing_kind
        output: { status: string }          # "ok" | "unsupported"

  crm:
    stage: experimental
    interface_version: "0.1"
    description: Contacts, deals, activities
    implementations: []
    tools:
      - name: find_contact
        input: { query: string, limit: number? }
        output: { contacts: [{ id: string, name: string, email: string?, phone: string?, company: string? }] }
      - name: upsert_contact
        input: { id: string?, name: string, email: string?, phone: string?, company: string?, metadata: object? }
        output: { id: string }
      - name: log_activity
        input: { contact_id: string, type: string, summary: string, details: object? }
        output: { activity_id: string }

  calendar:
    stage: experimental
    interface_version: "0.1"
    description: Events, availability, booking
    implementations: []
    tools:
      - name: list_events
        input: { from: string, to: string, calendar_id: string? }
        output: { events: [{ id: string, title: string, start: string, end: string, attendees: string[]? }] }
      - name: create_event
        input: { title: string, start: string, end: string, attendees: string[]?, description: string?, calendar_id: string? }
        output: { event_id: string }
      - name: check_availability
        input: { attendees: string[], from: string, to: string, duration_minutes: number }
        output: { slots: [{ start: string, end: string }] }

  vector-retrieval:
    stage: experimental
    interface_version: "0.1"
    description: Semantic search over a corpus (pgvector native in Nexaas)
    implementations:
      - pgvector-native (v0.1)
    tools:
      - name: search
        input: { query: string, namespace: string?, limit: number?, min_relevance: number? }
        output: { results: [{ id: string, content: string, relevance: number, metadata: object }] }
      - name: upsert
        input: { id: string, content: string, namespace: string?, metadata: object? }
        output: { id: string }
